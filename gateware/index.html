<!DOCTYPE html>
<html>
<head>
    <title>Tiliqua Multiboot Flash Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-weight: 500;
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scan-button {
            background-color: #2196F3;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.3);
        }

        .scan-button:hover {
            background-color: #1976D2;
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(33, 150, 243, 0.4);
        }

        .device-info {
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid #333;
            border-radius: 20px;
            padding: 10px 20px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 0.9em;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .device-info.connected {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }

        .device-info.error {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .circle-container {
            position: relative;
            width: 600px;
            height: 600px;
        }

        .circle {
            width: 100%;
            height: 100%;
            border: 3px solid #333;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(26, 38, 52, 0.4) 0%, rgba(10, 10, 10, 0.8) 100%);
            position: relative;
            transition: all 0.5s ease;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .circle.connected {
            border-color: #4CAF50;
            box-shadow: 0 0 80px rgba(76, 175, 80, 0.3), inset 0 0 50px rgba(76, 175, 80, 0.1);
        }

        /* Tab buttons around the circle */
        .tab-button {
            position: absolute;
            background: #1a1a1a;
            border: 2px solid #333;
            color: #666;
            padding: 12px 20px;
            cursor: not-allowed;
            border-radius: 25px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            transform-origin: center;
            white-space: nowrap;
            opacity: 0.5;
        }

        .tab-button.enabled {
            cursor: pointer;
            color: #aaa;
            opacity: 1;
        }

        .tab-button.enabled:hover {
            background: #222;
            border-color: #444;
            color: #fff;
            transform: scale(1.05);
        }

        .tab-button.active {
            background: #2196F3;
            border-color: #2196F3;
            color: #fff;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
            opacity: 1;
        }

        .tab-button.bootloader {
            background: #1a2634;
            border-color: #234;
        }

        .tab-button.bootloader.active {
            background: #2196F3;
            border-color: #2196F3;
        }

        /* Position tabs around left side of circle */
        .tab-button:nth-child(1) { left: -100px; top: 15%; transform: translateY(-50%); }
        .tab-button:nth-child(2) { left: -100px; top: 20.5%; transform: translateY(-50%)); }
        .tab-button:nth-child(3) { left: -100px; top: 35%; transform: translateY(-50%); }
        .tab-button:nth-child(4) { left: -100px; top: 45%; transform: translateY(-50%); }
        .tab-button:nth-child(5) { left: -100px; top: 55%; transform: translateY(-50%);  }
        .tab-button:nth-child(6) { left: -100px; top: 65%; transform: translateY(-50%); }
        .tab-button:nth-child(7) { left: -100px; top: 75%; transform: translateY(-50%); }
        .tab-button:nth-child(8) { left: -100px; top: 80.5%; transform: translateY(-50%)); }
        .tab-button:nth-child(9) { left: -100px; top: 95%; transform: translateY(-50%); }

        /* Content inside circle */
        .circle-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .circle-content.active {
            opacity: 1;
        }

        .slot-info {
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .file-input-wrapper {
            display: inline-block;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: #333;
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: #444;
            transform: translateY(-2px);
        }

        input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .flash-button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
            margin-top: 20px;
        }

        .flash-button:hover:not(:disabled) {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(76, 175, 80, 0.4);
        }

        .flash-button:disabled {
            background-color: #333;
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: none;
        }

        .manifest-view {
            background: rgba(15, 15, 15, 0.8);
            padding: 15px;
            border-radius: 15px;
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
            text-align: left;
            backdrop-filter: blur(10px);
            border: 1px solid #222;
        }

        .manifest-table {
            width: 100%;
            border-collapse: collapse;
        }

        .manifest-table td {
            padding: 3px 8px;
            vertical-align: top;
        }

        .manifest-table td:first-child {
            color: #4a9eff;
            white-space: nowrap;
            padding-right: 15px;
        }

        .manifest-table td:last-child {
            color: #aaa;
            word-break: break-word;
        }

        /* Log panel */
        .log-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(26, 26, 26, 0.95);
            border-left: 2px solid #333;
            padding: 30px 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .log-panel.show {
            transform: translateX(0);
        }

        .log-panel h3 {
            margin-top: 0;
            color: #fff;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            background: rgba(10, 10, 10, 0.8);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.85em;
            border: 1px solid #222;
        }

        .log-line {
            padding: 3px 0;
            line-height: 1.4;
        }

        .log-line.error {
            color: #ff6b6b;
        }

        .log-line.success {
            color: #4CAF50;
        }

        .log-line.info {
            color: #aaa;
        }

        .log-line .timestamp {
            color: #666;
            margin-right: 8px;
        }

        .log-line .slot-id {
            color: #4a9eff;
            margin-right: 8px;
        }

        /* Log toggle button */
        .log-toggle {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #333;
            border: 2px solid #444;
            color: #fff;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .log-toggle:hover {
            background: #444;
            border-color: #555;
        }

        .log-toggle.active {
            right: 420px;
        }

        /* Disconnected overlay */
        .disconnected-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(5px);
        }

        .disconnected-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .disconnected-text {
            font-size: 18px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 1200px) {
            .circle-container {
                width: 500px;
                height: 500px;
            }

            .log-panel {
                width: 350px;
            }

            .log-toggle.active {
                right: 370px;
            }
        }

        @media (max-width: 900px) {
            .circle-container {
                width: 400px;
                height: 400px;
            }

            .tab-button {
                font-size: 12px;
                padding: 8px 15px;
            }

            .log-panel {
                width: 100%;
                height: 40vh;
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                border-left: none;
                border-top: 2px solid #333;
                transform: translateY(100%);
            }

            .log-panel.show {
                transform: translateY(0);
            }

            .log-toggle {
                top: auto;
                bottom: 20px;
                right: 50%;
                transform: translateX(50%);
            }

            .log-toggle.active {
                right: 50%;
                bottom: 41vh;
            }
        }
    </style>
</head>
<body>

    <script type="module">
import { runOpenFPGALoader, Exit } from 'https://cdn.jsdelivr.net/npm/@yowasp/openfpgaloader/gen/bundle.js';
import { Archive } from 'https://cdn.jsdelivr.net/npm/libarchive.js@2.0.2/+esm';

// Constants from the Python script
const BOOTLOADER_BITSTREAM_ADDR = 0x000000;
const SLOT_BITSTREAM_BASE = 0x100000;
const SLOT_SIZE = 0x100000;
const MANIFEST_SIZE = 1024;
const FIRMWARE_BASE_SLOT0 = 0x1B0000;
const FLASH_PAGE_SIZE = 1024;
const MAX_ERROR_LINES = 100;
const globalLogHistory = [];
const N_MANIFESTS = 8;

// Store loaded archives
const loadedArchives = new Map();

// Store message history for each slot
const messageHistory = new Map();

// Add at the top of the file
let usbDevice = null;
let tiliquaHwVersion = null;
let currentSlot = null;

// UI functions
function showTab(slotId) {
    // Hide all content
    document.querySelectorAll('.circle-content').forEach(content => {
        content.classList.remove('active');
    });
    
    // Remove active from all tabs
    document.querySelectorAll('.tab-button').forEach(tab => {
        tab.classList.remove('active');
    });
    
    // Show selected content
    const content = document.querySelector(`[data-content="${slotId}"]`);
    if (content) {
        content.classList.add('active');
    }
    
    // Activate selected tab
    const tab = document.querySelector(`[data-slot="${slotId}"]`);
    if (tab) {
        tab.classList.add('active');
    }
    
    currentSlot = slotId;
}

function enableTabs() {
    document.querySelectorAll('.tab-button').forEach(tab => {
        tab.classList.add('enabled');
    });
    document.getElementById('main-circle').classList.add('connected');
    document.getElementById('disconnected-overlay').classList.add('hidden');
}

function disableTabs() {
    document.querySelectorAll('.tab-button').forEach(tab => {
        tab.classList.remove('enabled');
        tab.classList.remove('active');
    });
    document.getElementById('main-circle').classList.remove('connected');
    document.getElementById('disconnected-overlay').classList.remove('hidden');
    document.querySelectorAll('.circle-content').forEach(content => {
        content.classList.remove('active');
    });
}

async function scanForTiliqua() {
    try {
        showGlobalMessage("Scan for Tiliqua...");
        
        // Request device - we'll filter by product name after connection
        const devices = await navigator.usb.getDevices();
        let tiliquaDevice = null;
        
        // Check already paired devices first
        for (const device of devices) {
            if (device.productName && (device.productName.toLowerCase().includes('apfbug') || 
                                       device.productName.toLowerCase().includes('apf.audio'))) {
                tiliquaDevice = device;
                break;
            }
        }
        
        // If not found, request new device
        if (!tiliquaDevice) {
            tiliquaDevice = await navigator.usb.requestDevice({
                filters: [] // Accept any device, we'll check the name after
            });
        }
        
        if (!tiliquaDevice) {
            throw new Error("No device selected");
        }
        
        // Check if this is a Tiliqua device
        const productName = tiliquaDevice.productName || "";
        if (!productName.toLowerCase().includes('apfbug') && 
            !productName.toLowerCase().includes('apf.audio')) {
            throw new Error("Selected device is not a Tiliqua debugger");
        }
        
        // Extract hardware version from product name
        const hwVersionMatch = productName.match(/R(\d+)/);
        if (hwVersionMatch) {
            tiliquaHwVersion = parseInt(hwVersionMatch[1]);
            showGlobalMessage(`Found attached Tiliqua! (hw_rev=${tiliquaHwVersion}, serial=${tiliquaDevice.serialNumber})`);
            
            // Update device info display
            const deviceInfo = document.getElementById('device-info');
            deviceInfo.textContent = `Connected: ${productName} (hw_rev=R${tiliquaHwVersion}, serial=${tiliquaDevice.serialNumber})`;
            deviceInfo.className = 'device-info connected';
            
            // Store the device
            usbDevice = tiliquaDevice;
            
            // Enable tabs
            enableTabs();
            
            // Show first tab by default
            showTab('0');
            
            // Enable flash buttons for loaded archives
            loadedArchives.forEach((data, slotId) => {
                const button = document.querySelector(`[data-content="${slotId}"] .flash-button`);
                if (button) {
                    button.disabled = false;
                }
            });
            
            return tiliquaHwVersion;
        } else {
            throw new Error("Found tiliqua-like device, product code is malformed (update RP2040?).");
        }
        
    } catch (error) {
        const errorMsg = error.message || "Unknown error";
        showGlobalMessage(`Could not find Tiliqua debugger: ${errorMsg}`);
        showGlobalMessage("Check it is turned on, plugged in ('dbg' port), permissions correct, and RP2040 firmware is up to date.");
        
        // Update device info display
        const deviceInfo = document.getElementById('device-info');
        deviceInfo.textContent = `Error: ${errorMsg}`;
        deviceInfo.className = 'device-info error';
        
        return null;
    }
}

function showGlobalMessage(message) {
    const timestamp = new Date().toLocaleTimeString();
    const logContent = document.getElementById('global-log');
    const logLine = document.createElement('div');
    logLine.className = 'log-line info';
    logLine.innerHTML = `<span class="timestamp">${timestamp}</span>${message}`;
    logContent.appendChild(logLine);
    logContent.scrollTop = logContent.scrollHeight;
}

// Make handleFlash global
window.handleFlash = async function(slotId) {
    const slotData = loadedArchives.get(slotId.toString());
    if (!slotData) return;
    
    try {
        // Check if we have a device and if not, scan for one
        if (!tiliquaHwVersion) {
            showError(slotId, "No Tiliqua device connected. Please click 'Scan for Tiliqua' first.");
            return;
        }

        // Show manifest contents first
        showError(slotId, "Preparing to flash bitstream...");
        showError(slotId, "\nFinal manifest contents:");
        showError(slotId, JSON.stringify(slotData.manifest, null, 2));
        
        // Log regions
        showError(slotId, "\nRegions to be flashed:");
        for (const region of slotData.regions.sort((a, b) => a.addr - b.addr)) {
            const alignedSize = (region.size + FLASH_PAGE_SIZE - 1) & ~(FLASH_PAGE_SIZE - 1);
            showError(slotId, `  ${region.name}:
    start: 0x${region.addr.toString(16)}
    end:   0x${(region.addr + alignedSize - 1).toString(16)}`);
        }

        // Collect and sort commands
        const commands = [];
        
        for (const region of slotData.regions) {
            const fileData = await slotData.archive.get(region.filename)?.arrayBuffer();
            if (!fileData) continue;

            const fileType = region.filename === 'top.bit' ? 'bit' : 'raw';
            
            const cmd = {
                args: [
                    "-c", "dirtyJtag",
                    "-f",
                    "-o", `0x${region.addr.toString(16)}`,
                    "--file-type", fileType,
                    "--skip-reset"  // Add for all except last command
                ],
                data: new Uint8Array(fileData),
                name: region.filename,
                addr: region.addr
            };

            commands.push(cmd);
        }
        
        // Remove --skip-reset from the last command
        if (commands.length > 0) {
            commands[commands.length - 1].args = commands[commands.length - 1].args.filter(arg => arg !== '--skip-reset');
        }

        // Show commands in order
        showError(slotId, "\nThe following commands will be executed:");
        for (const cmd of commands) {
            showError(slotId, `\t$ openFPGALoader ${cmd.args.join(' ')} ${cmd.name}`);
        }

        showError(slotId, "\nExecuting flash commands...");

        // Execute commands
        for (const cmd of commands) {
            try {
                // Create a virtual file for the data
                const filesIn = {
                    'data': cmd.data
                };
                
                // Add the filename to the args
                const args = [...cmd.args, 'data'];
                
                // Run openFPGALoader with the virtual file
                await runOpenFPGALoader(args, filesIn, {
                    stdout: (data) => {
                        if (data) {
                            const text = new TextDecoder().decode(data);
                            showError(slotId, text);
                        }
                    },
                    stderr: (data) => {
                        if (data) {
                            const text = new TextDecoder().decode(data);
                            showError(slotId, `stderr: ${text}`);
                        }
                    }
                });
            } catch (error) {
                if (error instanceof Exit) {
                    throw new Error(`Command failed with exit code ${error.code}`);
                }
                throw error;
            }
        }
        
        showError(slotId, "\nFlashing completed successfully");
    } catch (error) {
        showError(slotId, `Flash failed: ${error.message}`);
    }
};

// Initialize all event handlers after DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
    // Scan button handler
    document.getElementById('scan-button').addEventListener('click', scanForTiliqua);
    
    // Tab button handlers
    document.querySelectorAll('.tab-button').forEach(tab => {
        tab.addEventListener('click', (e) => {
            if (e.target.classList.contains('enabled')) {
                showTab(e.target.dataset.slot);
            }
        });
    });
    
    // Log toggle handler
    const logToggle = document.getElementById('log-toggle');
    const logPanel = document.getElementById('log-panel');
    
    logToggle.addEventListener('click', () => {
        logPanel.classList.toggle('show');
        logToggle.classList.toggle('active');
    });
    
    // File input handlers
    document.querySelectorAll('input[type="file"]').forEach(input => {
        input.addEventListener('change', async (e) => {
            const slotId = e.target.id.split('-')[1];
            const file = e.target.files[0];
            if (file) {
                try {
                    await loadArchive(file, slotId);
                    // Update file label
                    const label = document.querySelector(`label[for="${e.target.id}"]`);
                    if (label) {
                        label.textContent = file.name;
                    }
                    // Enable flash button if connected
                    if (tiliquaHwVersion) {
                        const button = document.querySelector(`[data-content="${slotId}"] .flash-button`);
                        if (button) {
                            button.disabled = false;
                        }
                    }
                } catch (error) {
                    showError(slotId, error.message);
                }
            }
        });
    });

    // Flash button handlers
    document.querySelectorAll('.flash-button').forEach(button => {
        button.addEventListener('click', () => {
            const content = button.closest('.circle-content');
            const slotId = content.dataset.content;
            handleFlash(slotId);
        });
    });
});

// Add this helper class at the top of the file
class TarArchive {
    constructor() {
        this.files = new Map();
    }

    set(name, data) {
        this.files.set(name, data);
    }

    get(name) {
        const data = this.files.get(name);
        if (!data) return null;
        
        return {
            arrayBuffer: () => Promise.resolve(data),
            text: () => Promise.resolve(new TextDecoder().decode(data))
        };
    }
}

async function loadArchive(file, slotId) {
    const archive = await readTarGz(file);
    
    // Parse manifest
    const manifest = JSON.parse(await archive.get('manifest.json').text());
    
    // Check hardware version compatibility
    if (tiliquaHwVersion && manifest.hw_rev !== tiliquaHwVersion) {
        throw new Error(`Aborting: attached Tiliqua (hw=r${tiliquaHwVersion}) does not match archive (hw=r${manifest.hw_rev}).`);
    }
    
    // Determine if this is XIP firmware
    let has_xip_firmware = false;
    let xip_offset = null;
    for (const region of manifest.regions || []) {
        if (region.spiflash_src !== null && region.spiflash_src !== undefined) {
            has_xip_firmware = true;
            xip_offset = region.spiflash_src;
            break;
        }
    }
    
    // Validate slot assignment
    if (has_xip_firmware && slotId !== 'bootloader') {
        throw new Error(`Error: XIP firmware bitstreams must be flashed to bootloader slot\nRemove --slot argument to flash at 0x0 with firmware at 0x${xip_offset.toString(16)}`);
    } else if (!has_xip_firmware && slotId === 'bootloader') {
        throw new Error("Error: Must specify slot for non-XIP firmware bitstreams");
    }
    
    // Collect regions
    const regions = [];
    
    if (slotId === 'bootloader') {
        // Handle XIP firmware
        await handleXipFirmware(archive, manifest, regions);
    } else {
        // Handle PSRAM firmware
        const slot = parseInt(slotId);
        await handlePsramFirmware(archive, manifest, slot, regions);
    }
    
    // Check for overlaps
    const slot = slotId === 'bootloader' ? null : parseInt(slotId);
    const hasOverlap = checkRegionOverlaps(regions, slot);
    if (hasOverlap[0]) {
        throw new Error(hasOverlap[1]);
    }
    
    // Store archive and regions
    loadedArchives.set(slotId, { archive, regions, manifest });
    
    // Display manifest
    displayRegions(slotId, regions, manifest);
}

async function handleXipFirmware(archive, manifest, regions) {
    showGlobalMessage("\nPreparing to flash XIP firmware bitstream to bootloader slot...");
    
    // Add bootloader bitstream region
    const bitstreamData = await archive.get('top.bit').arrayBuffer();
    regions.push({
        name: 'bootloader bitstream',
        filename: 'top.bit',
        addr: BOOTLOADER_BITSTREAM_ADDR,
        size: bitstreamData.byteLength,
    });
    
    // Add XIP firmware regions
    for (const region of manifest.regions || []) {
        if (region.filename && region.spiflash_src !== null && region.spiflash_src !== undefined) {
            regions.push({
                name: `firmware '${region.filename}'`,
                filename: region.filename,
                addr: region.spiflash_src,
                size: region.size,
            });
        }
    }
}

async function handlePsramFirmware(archive, manifest, slot, regions) {
    showGlobalMessage(`\nPreparing to flash bitstream to slot ${slot}...`);
    
    // Calculate addresses
    const slotBase = SLOT_BITSTREAM_BASE + (slot * SLOT_SIZE);
    const bitstreamAddr = slotBase;
    const manifestAddr = (slotBase + SLOT_SIZE) - MANIFEST_SIZE;
    let firmwareBase = FIRMWARE_BASE_SLOT0 + (slot * SLOT_SIZE);
    
    // Add bitstream region
    const bitstreamData = await archive.get('top.bit').arrayBuffer();
    regions.push({
        name: 'bitstream',
        filename: 'top.bit',
        addr: bitstreamAddr,
        size: bitstreamData.byteLength,
    });
    
    // Update manifest and add firmware regions
    for (const region of manifest.regions || []) {
        if (!region.filename) continue;
        
        if (region.psram_dst !== null && region.psram_dst !== undefined) {
            // Ensure spiflash_src is not set for PSRAM regions
            if (region.spiflash_src !== null && region.spiflash_src !== undefined) {
                throw new Error("Both psram_dst and spiflash_src set");
            }
            
            region.spiflash_src = firmwareBase;
            showGlobalMessage(`manifest: region ${region.filename}: spiflash_src set to 0x${firmwareBase.toString(16)}`);
            
            regions.push({
                name: region.filename,
                filename: region.filename,
                addr: firmwareBase,
                size: region.size,
            });
            
            // Align to next 4KB boundary
            firmwareBase += region.size;
            firmwareBase = (firmwareBase + 0xFFF) & ~0xFFF;
        }
    }
    
    // Update manifest in archive
    const manifestJson = JSON.stringify(manifest);
    archive.set('manifest.json', new TextEncoder().encode(manifestJson));
    
    // Add manifest region
    regions.push({
        name: 'manifest',
        filename: 'manifest.json',
        addr: manifestAddr,
        size: MANIFEST_SIZE,
    });
}

function checkRegionOverlaps(regions, slot) {
    const alignedRegions = [];
    
    for (const r of regions) {
        const start = r.addr;
        const size = (r.size + FLASH_PAGE_SIZE - 1) & ~(FLASH_PAGE_SIZE - 1);
        const end = start + size;
        alignedRegions.push([start, end, r.name]);
        
        if (slot !== null) {
            const slotStart = Math.floor(start / SLOT_SIZE) * SLOT_SIZE;
            const slotEnd = slotStart + SLOT_SIZE;
            if (end > slotEnd) {
                return [true, `Region '${r.name}' exceeds slot boundary: ends at 0x${end.toString(16)}, slot ends at 0x${slotEnd.toString(16)}`];
            }
        }
    }
    
    alignedRegions.sort((a, b) => a[0] - b[0]);
    
    for (let i = 0; i < alignedRegions.length - 1; i++) {
        const currEnd = alignedRegions[i][1];
        const nextStart = alignedRegions[i + 1][0];
        if (currEnd > nextStart) {
            return [true, `Overlap detected between '${alignedRegions[i][2]}' (ends at 0x${currEnd.toString(16)}) and '${alignedRegions[i + 1][2]}' (starts at 0x${nextStart.toString(16)})`];
        }
    }
    
    return [false, ""];
}

function displayRegions(slotId, regions, manifest) {
    const regionsDiv = document.getElementById(`regions-${slotId}`);
    
    function createTableFromObject(obj) {
        const rows = [];
        function addRow(key, value, indent = 0) {
            // Skip the regions array
            if (key === 'regions') return;
            
            if (typeof value === 'object' && value !== null) {
                Object.entries(value).forEach(([k, v]) => {
                    addRow(k, v, indent + 2);
                });
            } else {
                rows.push(`<tr><td>${'&nbsp;'.repeat(indent)}${key}</td><td>${value}</td></tr>`);
            }
        }
        
        Object.entries(manifest).forEach(([key, value]) => {
            addRow(key, value);
        });
        
        return `<table class="manifest-table">${rows.join('')}</table>`;
    }
    
    regionsDiv.innerHTML = createTableFromObject(manifest);
}

function addToGlobalLog(slotId, message, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    const lines = message.split('\n');
    
    lines.forEach(line => {
        if (line.trim()) {  // Skip empty lines
            const logEntry = {
                timestamp,
                slotId,
                message: line,
                type
            };
            globalLogHistory.push(logEntry);
            
            // Update display
            const logContent = document.getElementById('global-log');
            const logLine = document.createElement('div');
            logLine.className = `log-line ${type}`;
            logLine.innerHTML = `<span class="timestamp">${timestamp}</span><span class="slot-id">[${slotId}] </span>${line}`;
            logContent.appendChild(logLine);
            
            // Auto-scroll to bottom
            logContent.scrollTop = logContent.scrollHeight;
        }
    });
}

function showError(slotId, message) {
    // Determine message type
    let type = 'info';
    if (message.toLowerCase().includes('error') || message.toLowerCase().includes('failed') || message.toLowerCase().includes('aborting')) {
        type = 'error';
    } else if (message.toLowerCase().includes('success')) {
        type = 'success';
    }
    
    // Add to global log
    addToGlobalLog(slotId, message, type);
}

async function readTarGz(file) {
    // Create archive object for our use
    const archive = new TarArchive();
    
    // Read the file
    const fileData = await file.arrayBuffer();
    
    // Decompress gzip
    const inflated = pako.inflate(new Uint8Array(fileData));
    
    // Parse tar - process 512 byte blocks
    let offset = 0;
    while (offset < inflated.length) {
        // Read header block
        const header = inflated.slice(offset, offset + 512);
        
        // Check for end of archive (empty block)
        if (header.every(byte => byte === 0)) {
            break;
        }
        
        // Parse filename (100 bytes)
        const filename = new TextDecoder().decode(header.slice(0, 100)).split('\0')[0];
        
        // Parse file size (12 bytes, octal string)
        const sizeStr = new TextDecoder().decode(header.slice(124, 136)).trim();
        const size = parseInt(sizeStr, 8);
        
        // Move past header
        offset += 512;
        
        // Read file content
        if (size > 0) {
            const content = inflated.slice(offset, offset + size);
            archive.set(filename, content);
            
            // Move to next 512-byte boundary
            offset += (Math.floor((size + 511) / 512) * 512);
        }
    }
    
    return archive;
}
